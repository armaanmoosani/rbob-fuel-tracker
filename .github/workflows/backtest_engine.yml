name: Weekly Backtest Engine

on:
  schedule:
    - cron: '0 3 * * 1' # Runs at 3:00 AM UTC on Mondays (Sunday 9:00 PM CT)
  workflow_dispatch:

concurrency:
  group: rbob-tracker
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy

      - name: Run Backtest Engine
        run: |
          python backtest.py
