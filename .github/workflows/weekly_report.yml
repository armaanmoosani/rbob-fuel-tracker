name: Weekly Performance Dashboard

on:
  schedule:
    # Run at 8:00 AM UTC every Saturday (3:00 AM CT)
    - cron: '0 8 * * 6'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Weekly Report Engine
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python weekly_report.py
        
      - name: Commit and Push Report and Backfilled Logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prediction_log.csv reports/
          # Only commit if there are changes to avoid action failures
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate weekly performance dashboard and backfill logs" && git push)
