name: Weekly Performance Dashboard

on:
  schedule:
    # Run at 8:00 AM UTC every Saturday (3:00 AM CT)
    - cron: '0 8 * * 6'
  workflow_dispatch:

concurrency:
  group: rbob-tracker
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Weekly Report Engine
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          PHONE_SMS_ADDRESS: ${{ secrets.PHONE_SMS_ADDRESS }}
        run: python weekly_report.py
        
      - name: Commit and Push Report and Backfilled Logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-unmatch data/prediction_log.csv data/integrity_hashes.csv reports/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generate weekly performance dashboard and backfill logs"
            # Fetch remote changes first, then rebase.
            # Auto-resolve conflicts on auto-generated data files:
            #   integrity_hashes / metrics_cache → take remote (theirs)
            #   prediction_log / reports         → keep our changes (ours)
            git fetch origin main
            git rebase -X ours origin/main \
              || { \
                git checkout --theirs data/integrity_hashes.csv data/metrics_cache.json 2>/dev/null || true; \
                git checkout --ours   data/prediction_log.csv 2>/dev/null || true; \
                git add data/integrity_hashes.csv data/metrics_cache.json data/prediction_log.csv 2>/dev/null || true; \
                git rebase --continue --no-edit; \
              }
            git push origin main
          else
            echo "No changes to commit"
          fi
