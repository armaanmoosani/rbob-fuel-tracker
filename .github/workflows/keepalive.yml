name: Keep Alive

# Prevents GitHub from auto-disabling the scheduled tracker workflow
# after 60 days of repository inactivity.
on:
  schedule:
    # Runs on the 1st of every month at 9:00 AM CT (15:00 UTC)
    - cron: '0 15 1 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Keep workflows alive
        uses: gautamkrishnar/keepalive-workflow@v2
