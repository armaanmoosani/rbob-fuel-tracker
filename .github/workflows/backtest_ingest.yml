name: Daily Price Ingestion

on:
  schedule:
    - cron: '0 0,1,2,3,4,5 * * 2-6' # Runs hourly from 7:00 PM to 12:00 AM CT (Mon-Fri evenings) to retry ingestion
  workflow_dispatch:

concurrency:
  group: rbob-tracker
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Ingest Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GRAVES_EMAIL: ${{ secrets.GRAVES_EMAIL }}
          GRAVES_APP_PASSWORD: ${{ secrets.GRAVES_APP_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          python ingest_prices.py

      - name: Send Failure SMS
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          PHONE_SMS_ADDRESS: ${{ secrets.PHONE_SMS_ADDRESS }}
        run: |
          python -c "import main, datetime; main.send_sms({}, datetime.datetime.now(main.TZ), {'label': 'FAILURE', 'action': 'Daily Ingestion & Backtest failed!'})"
