name: Daily Price Ingestion

on:
  schedule:
    - cron: '30 4 * * *' # Runs at 4:30 AM UTC (11:30 PM CT)
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Ingest Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GRAVES_EMAIL: ${{ secrets.GRAVES_EMAIL }}
          GRAVES_APP_PASSWORD: ${{ secrets.GRAVES_APP_PASSWORD }}
        run: |
          python ingest_prices.py
